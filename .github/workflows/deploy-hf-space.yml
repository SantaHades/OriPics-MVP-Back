name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  # Actions 탭에서 수동으로 실행할 수 있도록 허용
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://VitaminD7:$HF_TOKEN@huggingface.co/spaces/VitaminD7/OriPics-MVP-Back main

